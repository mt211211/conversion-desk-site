<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Free SaaS homepage conversion scorecard. Score your positioning, proof, CTA, and buying friction in under three minutes."><link rel="canonical" href="https://mt211211.github.io/conversion-desk-site/scorecard.html"><title>Free SaaS Homepage Conversion Scorecard</title><style>:root{--ink:#101828;--muted:#475467;--line:#e4e7ec;--soft:#f7f9fc;--brand:#5b4df5;--good:#087443}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 80% -10%,#e9e7ff 0,transparent 30%),#fff;line-height:1.55}.wrap{width:min(900px,calc(100% - 36px));margin:auto}nav{padding:22px 0;display:flex;justify-content:space-between}.brand{font-weight:800}.back{color:var(--muted)}header{padding:55px 0 30px}h1{font-size:clamp(38px,7vw,66px);line-height:1;letter-spacing:-.055em;margin:12px 0}.lead{font-size:19px;color:var(--muted)}.eyebrow{color:#3125b8;font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:12px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;margin:16px 0;box-shadow:0 15px 45px rgba(16,24,40,.07)}label{display:block;font-weight:750;margin-bottom:10px}select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:16px}.button{display:inline-block;border:0;border-radius:12px;padding:15px 22px;text-decoration:none;font-weight:800;background:var(--brand);color:#fff;cursor:pointer;font-size:16px}.result{display:none;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:28px;margin:28px 0}.score{font-size:56px;font-weight:850;letter-spacing:-.06em;color:var(--good)}footer{padding:35px 0;color:var(--muted);font-size:13px}</style></head><body><div class="wrap"><nav><div class="brand">Conversion Desk</div><a class="back" href="./">Back to services</a></nav><header><div class="eyebrow">Free 3-minute diagnostic</div><h1>Score your SaaS homepage before spending more on traffic.</h1><p class="lead">Answer ten practical questions. Get an instant score and the first area to fix.</p></header><form id="quiz"><div id="questions"></div><button class="button" type="submit">Get my score</button></form><section class="result" id="result"><div class="eyebrow">Your score</div><div class="score" id="score"></div><h2 id="headline"></h2><p id="advice" class="lead"></p><a class="button" href="https://buy.stripe.com/cNi7sE5vMgb52Rj9FYf3a0g">Get the $49 quick-win review</a></section><footer>Free tool by Conversion Desk. No signup required.</footer></div><script>const qs=['Does the hero name a specific target customer?','Does the hero promise a concrete outcome?','Can a visitor understand the product within five seconds?','Is there one visually dominant primary CTA?','Does the CTA state what happens next?','Is meaningful proof visible before the first major scroll?','Does the page answer the buyer’s biggest objection?','Is pricing or the buying process clear?','Does the page show the product or a real output?','Does the page give hesitant visitors a lower-commitment next step?'];const box=document.getElementById('questions');qs.forEach((q,i)=>{box.insertAdjacentHTML('beforeend',`<div class="card"><label for="q${i}">${i+1}. ${q}</label><select id="q${i}" required><option value="">Choose...</option><option value="10">Yes, clearly</option><option value="5">Partly</option><option value="0">No</option></select></div>`)});document.getElementById('quiz').addEventListener('submit',e=>{e.preventDefault();let s=0;qs.forEach((_,i)=>s+=Number(document.getElementById('q'+i).value));document.getElementById('score').textContent=s+'/100';let h,a;if(s<40){h='The page is making visitors work too hard.';a='Start with positioning and the primary CTA. More traffic will amplify the confusion.'}else if(s<70){h='The foundation is present, but friction is leaking demand.';a='Focus on proof, objections, and making the next step feel safer.'}else{h='Strong foundation. Now prioritize one high-leverage experiment.';a='A focused review can identify which remaining friction point is most worth testing first.'}document.getElementById('headline').textContent=h;document.getElementById('advice').textContent=a;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth'})});</script></body></html>
